services:
  - type: web
    name: bescom-pulse
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run bescom_pulse_app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false          # Set this manually in Render dashboard — never commit your key
      - key: PYTHON_VERSION
        value: 3.11.0
    autoDeploy: true
